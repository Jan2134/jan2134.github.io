<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <link rel="icon" href="/assets/images/auraeat.png" type="image/png">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      color: #1a1a1a;
      background: #fff;
      margin: 0;
      padding: 40px 24px 80px;
    }
    .content {
      max-width: 720px;
      margin: 0 auto;
    }
    h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 4px; }
    h2 { font-size: 1.15rem; font-weight: 700; margin-top: 2rem; }
    h3 { font-size: 1rem; font-weight: 700; margin-top: 1.5rem; }
    p, li { color: #334155; }
    a { color: #0f172a; }
    hr { border: none; border-top: 1px solid #e2e8f0; margin: 2rem 0; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid #e2e8f0; padding: 8px 12px; text-align: left; font-size: 0.9rem; }
    th { background: #f8fafc; font-weight: 600; }
    code { font-family: monospace; background: #f1f5f9; padding: 1px 4px; border-radius: 3px; font-size: 0.88em; }
    strong { color: #0f172a; }
  </style>
</head>
<body>
  <div class="content">
    {{ content }}
  </div>
</body>
</html>
